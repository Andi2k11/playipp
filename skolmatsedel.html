<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veckans Matsedel - Södervångskolan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            width: 480px;
            height: 678px;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #FFFFF9;
            overflow: hidden; 
            font-family: 'Open Sans', sans-serif;
            color: #4e7da1;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
        }

        .menu-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            text-align: center;
            border-bottom: 3px solid #4e7da1;
            padding-bottom: 5px;
        }

        .days-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .day-row {
            padding: 8px 12px;
            border-radius: 6px;
            opacity: 0.75;
            transition: all 0.3s ease;
        }

        .day-name {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
        }

        .food-text {
            font-size: 14px;
            font-weight: 700;
            margin: 4px 0 0 0;
            line-height: 1.3;
            color: #5c6b73;
        }

        /* --- STYLING FÖR DAGENS RÄTT --- */
        .day-row.today {
            background-color: #4e7da1;
            color: #FFFFF9;
            opacity: 1;
            padding: 14px 12px;
            box-shadow: 0 4px 12px rgba(78, 125, 161, 0.25);
        }

        .day-row.today .food-text {
            color: #FFFFF9;
            font-size: 15px;
        }
        
        .day-row.today .day-name {
            font-size: 18px;
        }

        .status-message {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            margin-top: 100px;
        }
    </style>
</head>
<body>

    <h1 class="menu-title">Skolmat</h1>
    <div class="days-container" id="menu-content">
        <div class="status-message">Laddar veckans matsedel...</div>
    </div>

    <script>
        async function laddaMatsedel() {
            try {
                const cacheBuster = "?t=" + new Date().getTime();
                const response = await fetch('mat.xml' + cacheBuster);
                
                if (!response.ok) throw new Error("Kunde inte hitta mat.xml");
                
                const textData = await response.text();
                
                // Tolka XML-texten till ett sökbart dokument
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(textData, "text/xml");
                const items = xmlDoc.getElementsByTagName("item");
                
                const menuContent = document.getElementById("menu-content");
                
                if (items.length === 0) {
                    menuContent.innerHTML = '<div class="status-message">Ingen matsedel tillgänglig denna vecka.</div>';
                    return;
                }

                let htmlInnehall = "";
                
                // Array för att matcha RSS-titlar till veckodagsindex
                const veckoDagar = ["Måndag", "Tisdag", "Onsdag", "Torsdag", "Fredag"];
                const dagensIndex = new Date().getDay(); // 1 = Måndag, 5 = Fredag

                // Loopa igenom matdagarna i RSS-flödet (max 5 dagar)
                for (let i = 0; i < Math.min(items.length, 5); i++) {
                    const item = items[i];
                    
                    // RSS-titeln innehåller oftast dagen, t.ex. "Måndag - Södervångskolan"
                    const fullTitle = item.getElementsByTagName("title")[0].textContent;
                    const veckodag = fullTitle.split(" - ")[0].trim();
                    
                    // Beskrivningen innehåller själva maten
                    const beskrivning = item.getElementsByTagName("description")[0].textContent.trim();

                    // Kolla om denna rad matchar dagens faktiska veckodag
                    const arIdag = (veckoDagar[dagensIndex - 1] === veckodag) ? "today" : "";

                    htmlInnehall += `
                        <div class="day-row ${arIdag}">
                            <div class="day-name">${veckodag}</div>
                            <p class="food-text">${beskrivning || "Ingen meny registrerad"}</p>
                        </div>
                    `;
                }

                menuContent.innerHTML = htmlInnehall;

            } catch (error) {
                console.error("Fel vid laddning:", error);
                document.getElementById("menu-content").innerHTML = 
                    '<div class="status-message">Kunde inte tolka matsedeln.</div>';
            }
        }

        laddaMatsedel();
    </script>
</body>
</html>
