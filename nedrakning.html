<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nedräkning Skärm - Endast Vardagar</title>
    <style>
        /* Nollställ marginaler och dölj scrollbars för Playipp */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e272e;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* A4-containern för infoskärmen */
        .skarm-container {
            width: 100vw;
            height: 141.4vw;
            max-height: 100vh;
            max-width: 70.7vh;
            
            /* Somrig och fräsch gradient */
            background: linear-gradient(180deg, #00b894, #00cec9); 
            
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 12% 5%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 9vw;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            line-height: 1.3;
        }

        #dagar-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 50px 20px;
            border-radius: 35px;
            width: 85%;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        #antal-dagar {
            font-size: 28vw;
            font-weight: 900;
            color: #fff200;
            line-height: 1;
            text-shadow: 3px 5px 10px rgba(0,0,0,0.4);
            margin: 0;
        }

        .enhet {
            font-size: 8vw;
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 10px;
            display: block;
        }

        .fotnot {
            font-size: 5vw;
            color: rgba(255,255,255,0.9);
            margin: 0;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="skarm-container">
        <h1 id="rubrik">Skoldagar kvar<br>till sommarlovet</h1>
        
        <div id="dagar-box">
            <p id="antal-dagar">..</p>
            <span id="enhet-text" class="enhet">Skoldagar</span>
        </div>
        
        <p class="fotnot">Kämpa på sista biten! ☀️</p>
    </div>

    <script>
        // Måldatum: 11 juni 2026
        const malDatum = new Date(2026, 5, 11);

        function raknaSkoldagar() {
            let idag = new Date();
            
            // Nollställ tiden för dagen så vi bara jämför datum
            idag.setHours(0, 0, 0, 0);
            let temporartDatum = new Date(idag);
            
            let skoldagarKvar = 0;

            // Loopa igenom varje dag från och med imorgon fram till måldatumet
            while (temporartDatum < malDatum) {
                temporartDatum.setDate(temporartDatum.getDate() + 1);
                
                let veckodag = temporartDatum.getDay(); 
                // 0 = Söndag, 6 = Lördag. Om det inte är helg, räkna med dagen!
                if (veckodag !== 0 && veckodag !== 6) {
                    skoldagarKvar++;
                }
            }

            // Kontrollera om det är helg JUST NU (idag)
            let idagVeckodag = idag.getDay();
            let arHelgIdag = (idagVeckodag === 0 || idagVeckodag === 6);

            // Om det är en vanlig skoldag idag, räknar vi med den nuvarande dagen också
            if (!arHelgIdag && idag < malDatum) {
                skoldagarKvar++;
            }

            // Visa resultatet på skärmen
            if (idag > malDatum || (idag.getTime() === malDatum.getTime() && skoldagarKvar === 0)) {
                // När dagen är kommen eller har passerat
                document.getElementById("antal-dagar").innerHTML = "🎉";
                document.getElementById("enhet-text").innerHTML = "SOMMARLOV!";
                document.getElementById("rubrik").innerHTML = "Äntligen";
            } else {
                document.getElementById("antal-dagar").innerHTML = skoldagarKvar;
                
                // Fixar grammatiken för sista dagen
                if (skoldagarKvar === 1) {
                    document.getElementById("enhet-text").innerHTML = "Skoldag";
                } else {
                    document.getElementById("enhet-text").innerHTML = "Skoldagar";
                }
            }
        }

        // Kör direkt vid start
        raknaSkoldagar();
        
        // Uppdatera en gång i timmen
        setInterval(raknaSkoldagar, 3600000);
    </script>

</body>
</html>
