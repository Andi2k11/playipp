<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nedräkning Skärm - Justerade Storlekar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <style>
        /* Nollställ marginaler och dölj scrollbars för Playipp */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e272e; 
            font-family: 'Open Sans', Arial, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Liggande A4-container */
        .skarm-container {
            width: 100vw;
            height: 70.71vw; 
            max-width: 100vh;
            max-height: 141.42vh; 
            
            background-color: #FFFFF9; 
            
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            align-items: center;
            
            /* Jämn och fin padding runt hela containern */
            padding: 6% 20px; 
            
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 175px; /* Minskad med 100px */
            max-width: 100%; 
            display: inline-block;
            margin: 0;
            color: #4e7da1; 
            text-transform: uppercase;
            letter-spacing: 1px; 
            font-weight: 800; 
            line-height: 1;
            white-space: nowrap; 
        }

        #dagar-box {
            padding: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        #antal-dagar {
            font-size: 200px; /* Minskad med 100px */
            font-weight: 800; 
            color: #4e7da1; 
            line-height: 0.9; 
            margin: 0;
        }

        .enhet {
            font-size: 150px; /* Minskad med 100px */
            max-width: 100%; 
            color: #4e7da1; 
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 15px;
            display: inline-block;
            line-height: 1;
        }
    </style>
</head>
<body>

    <div class="skarm-container">
        <h1 id="rubrik">Sommarlov om</h1>
        
        <div id="dagar-box">
            <p id="antal-dagar">..</p>
            <span id="enhet-text" class="enhet">Skoldagar</span>
        </div>
    </div>

    <script>
        // Måldatum: 11 juni 2026
        const malDatum = new Date(2026, 5, 11);

        function raknaSkoldagar() {
            let idag = new Date();
            
            idag.setHours(0, 0, 0, 0);
            let temporartDatum = new Date(idag);
            
            let skoldagarKvar = 0;

            while (temporartDatum < malDatum) {
                temporartDatum.setDate(temporartDatum.getDate() + 1);
                
                let veckodag = temporartDatum.getDay(); 
                if (veckodag !== 0 && veckodag !== 6) {
                    skoldagarKvar++;
                }
            }

            let idagVeckodag = idag.getDay();
            let arHelgIdag = (idagVeckodag === 0 || idagVeckodag === 6);

            if (!arHelgIdag && idag < malDatum) {
                skoldagarKvar++;
            }

            if (idag > malDatum || (idag.getTime() === malDatum.getTime() && skoldagarKvar === 0)) {
                document.getElementById("antal-dagar").innerHTML = "🎉";
                document.getElementById("enhet-text").innerHTML = "SOMMARLOV!";
                document.getElementById("rubrik").innerHTML = "Äntligen";
            } else {
                document.getElementById("antal-dagar").innerHTML = skoldagarKvar;
                
                if (skoldagarKvar === 1) {
                    document.getElementById("enhet-text").innerHTML = "Skoldag";
                } else {
                    document.getElementById("enhet-text").innerHTML = "Skoldagar";
                }
            }
        }

        raknaSkoldagar();
        setInterval(raknaSkoldagar, 3600000);
    </script>

</body>
</html>
