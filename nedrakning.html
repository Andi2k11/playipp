<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nedräkning till Sommarlov</title>
    <!-- Importera typsnittet Open Sans från Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #FFFFF9;
            color: #4e7da1;
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden; 
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1vw; 
            width: 95vw;
        }

        .title {
            font-size: clamp(2.5rem, 7vw, 5.5rem);
            font-weight: 800; /* Ändrad till Extra Bold från 700 */
            letter-spacing: 0.4vw;
            margin: 0;
        }

        .days-count {
            font-size: clamp(7rem, 24vw, 20rem);
            font-weight: 800;
            line-height: 0.85;
            margin: 0;
        }

        .subtitle {
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 0.3vw;
            margin: 0;
        }

        /* Styling för sommarlovsmeddelandet på en rad */
        .holiday-message-large {
            font-size: clamp(2rem, 5.5vw, 5.5rem);
            font-weight: 800;
            line-height: 1.2;
            width: 100%;
            margin: 0 auto;
            white-space: nowrap; /* Tvingar texten att hålla sig på en enda rad */
        }

        .holiday-message-small {
            font-size: clamp(1.2rem, 3.5vw, 2.8rem);
            font-weight: 700;
            line-height: 1.4;
            width: 100%;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="container" id="content-container">
        <!-- Innehållet styrs helt dynamiskt av JavaScriptet -->
    </div>

    <script>
        function uppdateraSida() {
            const idag = new Date();
            const nuvarandeAr = idag.getFullYear();
            
            // Kolla om det är 11 juni (månad indexeras från 0, så 5 = juni)
            if (idag.getMonth() === 5 && idag.getDate() === 11) {
                // Visa sommarlovsmeddelandet
                document.getElementById('content-container').innerHTML = `
                    <h1 class="holiday-message-large">
                        Ha ett härligt sommarlov!
                    </h1>
                    <p class="holiday-message-small">
                        Vi ses igen den 14 augusti!
                    </p>
                `;
            } else {
                // Annars: Beräkna skoldagar kvar till 11 juni
                let malDatum = new Date(nuvarandeAr, 5, 11);

                if (idag > malDatum) {
                    malDatum.setFullYear(nuvarandeAr + 1);
                }

                idag.setHours(0, 0, 0, 0);
                malDatum.setHours(0, 0, 0, 0);

                let antalSkoldagar = 0;
                let tillfalligtDatum = new Date(idag);

                while (tillfalligtDatum < malDatum) {
                    tillfalligtDatum.setDate(tillfalligtDatum.getDate() + 1);
                    
                    const veckodag = tillfalligtDatum.getDay();
                    if (veckodag !== 0 && veckodag !== 6) {
                        antalSkoldagar++;
                    }
                }

                document.getElementById('content-container').innerHTML = `
                    <h1 class="title">SOMMARLOV OM</h1>
                    <div class="days-count">${antalSkoldagar}</div>
                    <h2 class="subtitle">SKOLDAGAR</h2>
                `;
            }
        }

        // Kör funktionen vid sidladdning
        uppdateraSida();
    </script>
</body>
</html>
