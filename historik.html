<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denna dag i historien</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            width: 480px;
            height: 678px;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #FFFFF9;
            overflow: hidden; 
            font-family: 'Open Sans', sans-serif;
            color: #4e7da1;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            justify-content: space-between;
        }

        .header-area {
            text-align: center;
        }

        .main-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .date-title {
            font-size: 16px;
            font-weight: 700;
            color: #76405d; 
            margin: 5px 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider {
            border-bottom: 3px solid #4e7da1;
            margin-bottom: 20px;
        }

        /* --- BILDYTA --- */
        .image-container {
            width: 100%;
            height: 240px;
            border-radius: 8px;
            overflow: hidden;
            background-color: transparent; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-height: 100%; 
            width: auto;       
            object-fit: contain; 
            border-radius: 8px;
        }

        /* --- TEXTINNEHÅLL --- */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: 20px 0;
            text-align: center;
        }

        .event-title {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 10px 0;
            line-height: 1.2;
            color: #4e7da1;
        }

        .event-text {
            font-size: 15px;
            font-weight: 700;
            color: #5c6b73;
            margin: 0;
            line-height: 1.4;
        }

        /* --- FOOTER --- */
        .footer-tag {
            background-color: #76405d;
            color: #FFFFF9;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1 class="main-title">Denna dag i historien</h1>
        <div class="date-title" id="dagens-datum">Laddar datum...</div>
        <div class="divider"></div>
    </div>

    <div class="image-container">
        <img id="event-bild" src="" alt="Händelsebild" onerror="if (this.src != 'platshallare.jpg') this.src = 'platshallare.jpg';">
    </div>

    <div class="content-area">
        <h2 class="event-title" id="event-titel">Laddar rubrik...</h2>
        <p class="event-text" id="event-text">Laddar information...</p>
    </div>

    <div class="footer-tag" id="event-ar">
        HISTORIA
    </div>

    <script>
        // Ny fallback-data utan bildlänk (använder också platshallare.jpg om den triggas)
        const fallbackData = {
            titel: "Visste du att...?",
            text: "Ljusets hastighet är ungefär 300 000 kilometer i sekunden. Det betyder att det tar solens strålar lite drygt 8 minuter att nå hela vägen fram till oss på jorden.",
            fotnot: "VETENSKAP"
        };

        async function laddaHistorik() {
            try {
                const nu = new Date();
                
                const manader = ["januari", "februari", "mars", "april", "maj", "juni", "juli", "augusti", "september", "oktober", "november", "december"];
                document.getElementById("dagens-datum").textContent = `${nu.getDate()} ${manader[nu.getMonth()]}`;

                const mm = String(nu.getMonth() + 1).padStart(2, '0');
                const dd = String(nu.getDate()).padStart(2, '0');
                
                // Skapar bildnamnet baserat på datum, t.ex. "0801.jpg"
                const bildNamn = `${mm}${dd}.jpg`;
                
                // Nyckel till JSON-filen (behåller bindestrecket där för tydlighet: "08-01")
                const datumNyckel = `${mm}-${dd}`;

                const cacheBuster = "?t=" + nu.getTime();
                const response = await fetch('historik.json' + cacheBuster);
                
                let valdHandelse = null;
                
                if (response.ok) {
                    const data = await response.json();
                    if (data[datumNyckel]) {
                        valdHandelse = data[datumNyckel];
                    }
                }

                // Om datumet saknas -> Kör vår fallback och visa platshållarbilden
                if (!valdHandelse) {
                    document.getElementById("event-titel").textContent = fallbackData.titel;
                    document.getElementById("event-text").textContent = fallbackData.text;
                    document.getElementById("event-bild").src = "platshallare.jpg";
                    document.getElementById("event-ar").textContent = fallbackData.fotnot;
                    return;
                }

                // Om allt finns -> Tryck ut datan på skärmen
                const antalArSedan = nu.getFullYear() - valdHandelse.år;
                
                document.getElementById("event-titel").textContent = valdHandelse.titel;
                document.getElementById("event-text").textContent = valdHandelse.text;
                
                // Sätter bildens källa till t.ex. "0801.jpg". Om filen saknas kickar "onerror" igång i HTML-taggen ovan.
                document.getElementById("event-bild").src = bildNamn;
                
                document.getElementById("event-ar").textContent = `${valdHandelse.kategori} | ${antalArSedan} ÅR SEDAN (${valdHandelse.år})`;

            } catch (error) {
                console.error("Fel vid laddning av historik:", error);
                document.getElementById("event-titel").textContent = fallbackData.titel;
                document.getElementById("event-text").textContent = fallbackData.text;
                document.getElementById("event-bild").src = "platshallare.jpg";
                document.getElementById("event-ar").textContent = fallbackData.fotnot;
            }
        }

        laddaHistorik();
    </script>
</body>
</html>
