<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denna dag i historien</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700;800&display=swap" rel="stylesheet">

    <style>
        html, body {
            width: 480px;
            height: 678px;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #FFFFF9;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
            color: #4e7da1;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            justify-content: space-between;
            position: relative;
        }

        .header-area {
            text-align: center;
        }

        .main-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .date-title {
            font-size: 16px;
            font-weight: 700;
            color: #76405d;
            margin: 5px 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider {
            border-bottom: 3px solid #4e7da1;
            margin-bottom: 20px;
        }

        .image-container {
            width: 100%;
            height: 240px;
            border-radius: 8px;
            overflow: hidden;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: 20px 0;
            text-align: center;
        }

        .event-title {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 10px 0;
            line-height: 1.2;
            color: #4e7da1;
        }

        .event-text {
            font-size: 15px;
            font-weight: 700;
            color: #5c6b73;
            margin: 0;
            line-height: 1.4;
        }

        .footer-tag {
            background-color: #76405d;
            color: #FFFFF9;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* TESTKNAPPAR */

        .nav-buttons {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .nav-buttons button {
            border: none;
            background-color: #4e7da1;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            font-size: 12px;
        }

        .nav-buttons button:hover {
            background-color: #76405d;
        }
    </style>
</head>

<body>

    <!-- TESTKNAPPAR -->
    <div class="nav-buttons">
        <button onclick="bytDag(-1)">←</button>
        <button onclick="bytDag(1)">→</button>
    </div>

    <div class="header-area">
        <h1 class="main-title">Denna dag i historien</h1>
        <div class="date-title" id="dagens-datum">Laddar datum...</div>
        <div class="divider"></div>
    </div>

    <div class="image-container">
        <img id="event-bild" src="" alt="Händelsebild">
    </div>

    <div class="content-area">
        <h2 class="event-title" id="event-titel">Laddar rubrik...</h2>
        <p class="event-text" id="event-text">Laddar information...</p>
    </div>

    <div class="footer-tag" id="event-ar">
        HISTORIA
    </div>

    <script>

        const fallbackData = {
            titel: "Visste du att...?",
            text: "Ljusets hastighet är ungefär 300 000 kilometer i sekunden.",
            fotnot: "VETENSKAP"
        };

        // TESTDATUM
        let testDatum = new Date();

        function bytDag(antal) {

            testDatum.setDate(testDatum.getDate() + antal);

            laddaHistorik();
        }

        async function laddaHistorik() {

            try {

                const nu = new Date(testDatum);

                const manader = [
                    "januari",
                    "februari",
                    "mars",
                    "april",
                    "maj",
                    "juni",
                    "juli",
                    "augusti",
                    "september",
                    "oktober",
                    "november",
                    "december"
                ];

                document.getElementById("dagens-datum").textContent =
                    `${nu.getDate()} ${manader[nu.getMonth()]}`;

                const mm = String(nu.getMonth() + 1).padStart(2, '0');
                const dd = String(nu.getDate()).padStart(2, '0');

                const datumNyckel = `${mm}-${dd}`;

                const cacheBuster = "?t=" + new Date().getTime();

                const response = await fetch('historik.json' + cacheBuster);

                let valdHandelse = null;

                if (response.ok) {

                    const data = await response.json();

                    if (data[datumNyckel]) {
                        valdHandelse = data[datumNyckel];
                    }
                }

                if (!valdHandelse) {

                    document.getElementById("event-titel").textContent =
                        fallbackData.titel;

                    document.getElementById("event-text").textContent =
                        fallbackData.text;

                    document.getElementById("event-bild").src =
                        "bilder/platshallare.png";

                    document.getElementById("event-ar").textContent =
                        fallbackData.fotnot;

                    return;
                }

                const antalArSedan =
                    nu.getFullYear() - valdHandelse.år;

                document.getElementById("event-titel").textContent =
                    valdHandelse.titel;

                document.getElementById("event-text").textContent =
                    valdHandelse.text;

                document.getElementById("event-ar").textContent =
                    `${valdHandelse.kategori} | ${antalArSedan} ÅR SEDAN (${valdHandelse.år})`;

                // ----- BILDER -----

                const bildBasUrl =
                    "https://andi2k11.github.io/playipp/bilder/";

                const bildJpg =
                    `${bildBasUrl}${mm}-${dd}.jpg`;

                const bildPng =
                    `${bildBasUrl}${mm}-${dd}.png`;

                const bildElement =
                    document.getElementById("event-bild");

                // Försök ladda JPG först
                bildElement.src = bildJpg;

                // Om JPG saknas -> försök PNG
                bildElement.onerror = function () {

                    if (this.src === bildJpg) {

                        this.onerror = function () {

                            this.onerror = null;
                            this.src = "bilder/platshallare.png";
                        };

                        this.src = bildPng;

                    } else {

                        this.onerror = null;
                        this.src = "bilder/platshallare.png";
                    }
                };

            } catch (error) {

                console.error("Fel vid laddning av historik:", error);

                document.getElementById("event-titel").textContent =
                    fallbackData.titel;

                document.getElementById("event-text").textContent =
                    fallbackData.text;

                document.getElementById("event-bild").src =
                    "bilder/platshallare.png";

                document.getElementById("event-ar").textContent =
                    fallbackData.fotnot;
            }
        }

        laddaHistorik();

    </script>

</body>
</html>
